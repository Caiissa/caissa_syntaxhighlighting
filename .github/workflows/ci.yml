name: Syntaxhighlighting Continuous Integration

on:
    pull_request:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Java 25
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 25
                  cache: gradle

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v5

            - name: Build project
              run: ./gradlew build -x test -x spotlessCheck --no-daemon

    test:
        name: JUnit Tests
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Java 25
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 25
                  cache: gradle

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v5

            - name: Run JUnit tests
              run: ./gradlew test --no-daemon

    format:
        name: Spotless Check
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Java 25
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 25
                  cache: gradle

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v5

            - name: Verify code formatting
              run: ./gradlew spotlessCheck --no-daemon
